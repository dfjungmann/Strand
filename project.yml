name: Strand
options:
  bundleIdPrefix: de.dietmar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: de.dietmar.Strand
    MARKETING_VERSION: "1.5"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM wird bewusst nicht gesetzt – Xcode verwaltet das Signing

targets:
  Strand:
    type: application
    platform: iOS
    sources:
      - path: Strand
    info:
      path: Strand/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsArbitraryLoadsInWebContent: true
          NSExceptionDomains:
            ideihm.covam.es:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            api.rainviewer.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: false
            tilecache.rainviewer.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: false
            tile.openweathermap.org:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: false
    settings:
      base:
        INFOPLIST_FILE: Strand/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
