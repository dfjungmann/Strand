name: Strand
options:
  bundleIdPrefix: de.dietmar
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.5"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 47D76MD2KB

targets:
  Strand:
    type: application
    platform: iOS
    sources:
      - path: Strand
    info:
      path: Strand/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsArbitraryLoadsInWebContent: true
          NSExceptionDomains:
            ideihm.covam.es:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            api.rainviewer.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: false
            tilecache.rainviewer.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: false
            tile.openweathermap.org:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: false
        UIAppFonts:
          - DSEG7Classic-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.dietmar.Strand
        INFOPLIST_FILE: Strand/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Bei CoreDeviceError 3002: dependencies-Block auskommentieren, xcodegen generate, neu bauen.
    dependencies:
      - target: StrandWatch
        embed: true
      - sdk: WatchConnectivity.framework

  StrandWatch:
    type: application
    platform: watchOS
    sources:
      - path: StrandWatch
      - path: Strand/Models/TideModels.swift
      - path: Strand/Models/TideClockState.swift
      - path: Strand/Models/TideBeachWalk.swift
      - path: Strand/Models/TideDisplaySettings.swift
      - path: Strand/Models/TideSettingsKeys.swift
      - path: Strand/Services/WatchSettingsSync.swift
      - path: Strand/Services/TideService.swift
      - path: Strand/Services/TideCache.swift
      - path: Strand/Services/TideComplicationStore.swift
    resources:
      - path: StrandWatch/Assets.xcassets
    info:
      path: StrandWatch/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: de.dietmar.Strand
        CFBundleDisplayName: Strand
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            ideihm.covam.es:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.dietmar.Strand.watchkitapp
        INFOPLIST_FILE: StrandWatch/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Strand
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: de.dietmar.Strand
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: StrandWatch/StrandWatch.entitlements
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 47D76MD2KB
        SKIP_INSTALL: true
    dependencies:
      - target: StrandWatchWidgets
        embed: true
      - sdk: WatchConnectivity.framework
    scheme: {}

  StrandWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: StrandWatchWidgets
      - path: Strand/Models/TideModels.swift
      - path: Strand/Models/TideClockState.swift
      - path: Strand/Models/TideBeachWalk.swift
      - path: Strand/Models/TideDisplaySettings.swift
      - path: Strand/Models/TideSettingsKeys.swift
      - path: Strand/Services/TideComplicationStore.swift
      - path: Strand/Services/TideService.swift
      - path: Strand/Services/TideCache.swift
    info:
      path: StrandWatchWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            ideihm.covam.es:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.dietmar.Strand.watchkitapp.widgets
        INFOPLIST_FILE: StrandWatchWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: StrandWatchWidgets/StrandWatchWidgets.entitlements
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 47D76MD2KB
        SKIP_INSTALL: true
    scheme: {}

schemes:
  Strand:
    build:
      targets:
        Strand: all
        StrandWatch: all
    run:
      config: Debug
  StrandWatch:
    build:
      targets:
        StrandWatch: all
        StrandWatchWidgets: all
    run:
      config: Debug
      debugExecutable: false
